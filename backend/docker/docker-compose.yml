services:
  db:
    container_name: pg
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    env_file: ../.env
    environment:
      REDIS_PORT: 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
  # server:
  #   container_name: "server"
  #   image: server:1.0
  #   restart: always
  #   entrypoint: ["./server"]
  #   env_file: ../.env
  #   environment:
  #     DB_HOST: "db"
  #     DB_PORT: 5432
  #   ports:
  #     - "3030:3030"
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     migration:
  #       condition: service_completed_successfully
  migration:
    container_name: migration
    image: gomicro/goose:3.26.0
    entrypoint: ["/migrations/entrypoint.sh"]
    env_file: ../.env
    environment:
      DB_HOST: "db"
      DB_PORT: 5432
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:

name: diploma
